name: Daily MLB Screen

on:
  schedule:
    # 4 corridas cubren juegos de mediodia (domingos) y de noche.
    # Las props se jalan solas en la ventana antes del PRIMER juego del dia.
    - cron: '0 13 * * *'   # 9:00 AM ET
    - cron: '0 15 * * *'   # 11:00 AM ET  (cubre domingos con juegos a las 12)
    - cron: '0 17 * * *'   # 1:00 PM ET
    - cron: '0 22 * * *'   # 6:00 PM ET   (cubre juegos de noche)
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python screen.py
      - name: Commit report + snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add reports/ snapshots/
          git diff --cached --quiet || git commit -m "Screen $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
