name: Daily MLB Screen

on:
  schedule:
    # 3 corridas: apertura (10am ET), mediodia (3pm ET), pre-juego (6:30pm ET)
    - cron: '0 14 * * *'
    - cron: '0 19 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python screen.py
      - name: Commit report + snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add reports/ snapshots/
          git diff --cached --quiet || git commit -m "Screen $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
